language: typescript
project:
    name: frontend
    description: SvelteKit frontend application
stack: frontend
layer: library

fileGroups:
    sources:
        - 'src/**/*'
        - 'static/**/*'
    configs:
        - package.json
        - tsconfig.json
        - vite.config.js
        - svelte.config.js
        - drizzle.config.js
        - eslint.config.js

tasks:
    build:
        deps:
            - sync
        outputs:
            - build/
            - .svelte-kit/

    sync:
        command: svelte-kit sync
        inputs:
            - '@group(sources)'
            - '@group(configs)'
        outputs:
            - .svelte-kit/

    db-pull:
        command: drizzle-kit pull --config drizzle.config.js
        inputs:
            - '@group(sources)'
            - drizzle.config.js
            - package.json
        outputs:
            - src/lib/db/schema.ts
