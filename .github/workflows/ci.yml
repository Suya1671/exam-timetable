name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    nix-check:
        name: Nix Flake Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install Nix
              uses: canidae-solutions/lix-quick-install-action@v4

            - name: Setup nix-community cache
              uses: cachix/cachix-action@v16
              with:
                  name: nix-community

            - name: Cache Nix inputs
              uses: cachix/cachix-action@v14
              with:
                  name: exam-timetable
                  authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

            - name: Run flake check
              run: nix flake check --allow-import-from-derivation
    moonrepo-check:
        name: Moonrepo Checks, Lints, and Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Install Ubuntu dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    build-essential \
                    curl \
                    wget \
                    file \
                    libssl-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libsqlite3-dev \
                    pkg-config \
                    cmake \
                    mold \
                    clang

            - name: Setup moon toolchain
              uses: 'moonrepo/setup-toolchain@v0'

            - name: Setup pnpm
              uses: pnpm/action-setup@v5
              with:
                  cache: true
                  run_install: true

            - name: Setup Rust
              uses: moonrepo/setup-rust@v1
              with:
                  bins: cargo-nextest, cargo-hakari, cargo-llvm-cov, diesel_cli, cargo-deny
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Run moonrepo CI
              run: moon ci :check :lint :test

            - name: Report run results
              uses: 'moonrepo/run-report-action@v1'
              if: success() || failure()
              with:
                  access-token: ${{ secrets.GITHUB_TOKEN }}
