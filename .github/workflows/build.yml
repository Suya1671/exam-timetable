name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: '--features gh-release'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --features gh-release'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin --features gh-release'
          - platform: windows-latest
            args: '--features gh-release'

    runs-on: ${{ matrix.platform }}

    env:
      # z3-src uses std::format / std::to_chars for floats, which requires
      # macOS 13.3+. Without this, cmake injects -mmacosx-version-min=10.13
      # and the SDK marks those symbols unavailable, breaking the build.
      MACOSX_DEPLOYMENT_TARGET: '13.3'
      CMAKE_OSX_DEPLOYMENT_TARGET: '13.3'

    steps:
      - uses: actions/checkout@v6

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: xcode-select --install || true

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsqlite3-dev \
            pkg-config \
            cmake \
            mold \
            clang

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
          cache_dependency_path: frontend/pnpm-lock.yaml
          package_json_file: frontend/package.json
          run_install: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          READ_ONLY_GITHUB_TOKEN: ${{ secrets.READ_ONLY_GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: exam-scheduler-${{ matrix.platform }}-${{ matrix.targets || 'default' }}
          path: target/release/bundle/**
          retention-days: 5
